services:
  postgres:
    image: postgres:16-alpine
    container_name: kuizard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # On bind UNIQUEMENT sur localhost (127.0.0.1) — pas exposé en public
      - "127.0.0.1:5432:5432"
    volumes:
      - kuizard_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kuizard_pg_data:
    name: kuizard_pg_data
