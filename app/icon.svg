<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond violet brand Kuizard #5523BB -->
  <rect width="64" height="64" rx="13" fill="#5523BB"/>

  <!-- Question mark blanc -->
  <text x="32" y="33"
        font-family="'Arial Black', 'Helvetica', sans-serif"
        font-size="32"
        font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle">?</text>

  <!-- Bande du chapeau (carré au-dessus du brim) -->
  <rect x="27" y="38" width="10" height="6" fill="#FFFFFF"/>

  <!-- Brim (sourire/soucoupe) -->
  <ellipse cx="32" cy="46" rx="20" ry="3" fill="#FFFFFF"/>

  <!-- Bas du chapeau (cylindre) -->
  <rect x="24" y="46" width="16" height="10" rx="0.5" fill="#FFFFFF"/>
</svg>
